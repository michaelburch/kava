name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        shell: pwsh
        working-directory: Kava
        run: dotnet restore Kava.slnx

      - name: Build solution
        shell: pwsh
        working-directory: Kava
        run: dotnet build Kava.slnx -c Debug --no-restore

      - name: Run tests
        shell: pwsh
        working-directory: Kava
        run: dotnet test Kava.slnx -c Debug --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            Kava/**/TestResults/**/*.trx

  sonar:
    name: SonarQube Analysis
    runs-on:
      - self-hosted
      - windows
    environment: dev
    if: github.event_name != 'pull_request'

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_SCANNER_JAVA_OPTS: -Djavax.net.debug=ssl:handshake:record -Djava.net.useSystemProxies=false -Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false

    steps:
      - name: Check Sonar configuration
        id: sonar-config
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SONAR_TOKEN)) {
            "enabled=false" >> $env:GITHUB_OUTPUT
          }
          else {
            "enabled=true" >> $env:GITHUB_OUTPUT
          }

      - name: Skip SonarQube analysis
        if: steps.sonar-config.outputs.enabled != 'true'
        shell: pwsh
        run: Write-Host "SONAR_TOKEN is not configured. Skipping SonarQube analysis."

      - name: Check out repository
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Capture runner diagnostics
        if: steps.sonar-config.outputs.enabled == 'true'
        shell: pwsh
        run: |
          Write-Host "Runner OS:"; Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsBuildNumber, OsHardwareAbstractionLayer | Format-List
          Write-Host "dotnet --info"; dotnet --info
          Write-Host "WinHTTP proxy"; netsh winhttp show proxy
          Write-Host "Proxy-related environment variables"; Get-ChildItem Env: | Where-Object { $_.Name -match '^(HTTP|HTTPS|ALL|NO)_PROXY$|^SONAR_' } | Sort-Object Name | Format-Table -AutoSize
          Write-Host "DNS resolution for sonar.burch.es"; Resolve-DnsName sonar.burch.es | Select-Object Name, Type, IPAddress | Format-Table -AutoSize

      - name: Run Sonar scan
        if: steps.sonar-config.outputs.enabled == 'true'
        shell: pwsh
        run: |
          @(
            'GITHUB_ACTIONS',
            'GITHUB_API_URL',
            'GITHUB_BASE_REF',
            'GITHUB_EVENT_NAME',
            'GITHUB_HEAD_REF',
            'GITHUB_REF',
            'GITHUB_REF_NAME',
            'GITHUB_REF_TYPE',
            'GITHUB_REPOSITORY',
            'GITHUB_REPOSITORY_ID',
            'GITHUB_REPOSITORY_OWNER',
            'GITHUB_REPOSITORY_OWNER_ID',
            'GITHUB_SERVER_URL',
            'GITHUB_SHA'
          ) | ForEach-Object {
            Remove-Item "Env:$_" -ErrorAction SilentlyContinue
          }

          .\Kava\scripts\sonar-scan.ps1 -VerboseLogging

      - name: Upload Sonar summary
        if: always() && steps.sonar-config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sonar-summary
          path: |
            Kava/.sonar/output/sonar-summary.json
            Kava/.sonar/output/sonar-summary.md